<svg viewBox="0 0 1090 1090" xmlns="http://www.w3.org/2000/svg" role="img" style="width: 100%; margin: auto;">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Post 2 — Para quién es Reason</title>

  <!-- Fondo negro -->
  <rect width="1080" height="1080" fill="#0A0A0A" style="fill:rgb(10, 10, 10);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Línea terracota superior — acento mínimo -->
  <rect x="80" y="80" width="48" height="3" fill="#C25A2C" style="fill:rgb(194, 90, 44);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Texto principal -->
  <text x="80" y="320" font-family="'Geist', 'Inter', sans-serif" font-size="112" font-weight="700" fill="#FFFFFF" letter-spacing="-4" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:112px;font-weight:700;text-anchor:start;dominant-baseline:auto">reason</text>
  <text x="80" y="430" font-family="'Geist', 'Inter', sans-serif" font-size="112" font-weight="700" fill="#FFFFFF" letter-spacing="-4" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:112px;font-weight:700;text-anchor:start;dominant-baseline:auto">es para</text>
  <text x="80" y="540" font-family="'Geist', 'Inter', sans-serif" font-size="112" font-weight="700" fill="#FFFFFF" letter-spacing="-4" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:112px;font-weight:700;text-anchor:start;dominant-baseline:auto">el</text>
  <text x="80" y="650" font-family="'Geist', 'Inter', sans-serif" font-size="112" font-weight="700" fill="#C25A2C" letter-spacing="-4" style="fill:rgb(194, 90, 44);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:112px;font-weight:700;text-anchor:start;dominant-baseline:auto">kinesiólogo</text>
  <text x="80" y="760" font-family="'Geist', 'Inter', sans-serif" font-size="112" font-weight="700" fill="#FFFFFF" letter-spacing="-4" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:112px;font-weight:700;text-anchor:start;dominant-baseline:auto">que lee.</text>

  <!-- Copy secundario -->
  <text x="80" y="860" font-family="'Geist', 'Inter', sans-serif" font-size="36" font-weight="400" fill="#888888" style="fill:rgb(136, 136, 136);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:36px;font-weight:400;text-anchor:start;dominant-baseline:auto">Que guarda papers. Que tiene criterio.</text>
  <text x="80" y="910" font-family="'Geist', 'Inter', sans-serif" font-size="36" font-weight="400" fill="#888888" style="fill:rgb(136, 136, 136);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:36px;font-weight:400;text-anchor:start;dominant-baseline:auto">Y que igual, a veces, sale de la consulta</text>
  <text x="80" y="960" font-family="'Geist', 'Inter', sans-serif" font-size="36" font-weight="400" fill="#888888" style="fill:rgb(136, 136, 136);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:36px;font-weight:400;text-anchor:start;dominant-baseline:auto">sintiendo que podría haber decidido mejor.</text>
</svg>