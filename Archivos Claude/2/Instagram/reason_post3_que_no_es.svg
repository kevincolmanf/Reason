<svg viewBox="0 0 1090 1090" xmlns="http://www.w3.org/2000/svg" role="img" style="width: 100%; margin: auto;">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Post 3 — Qué no es Reason</title>

  <!-- Fondo negro -->
  <rect width="1080" height="1080" fill="#0A0A0A" style="fill:rgb(10, 10, 10);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Línea terracota superior -->
  <rect x="80" y="80" width="48" height="3" fill="#C25A2C" style="fill:rgb(194, 90, 44);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Negaciones en gris — se leen, pero no gritan -->
  <text x="80" y="280" font-family="'Geist', 'Inter', sans-serif" font-size="96" font-weight="700" fill="#3A3A3A" letter-spacing="-3" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:96px;font-weight:700;text-anchor:start;dominant-baseline:auto">no es un curso.</text>
  <text x="80" y="390" font-family="'Geist', 'Inter', sans-serif" font-size="96" font-weight="700" fill="#3A3A3A" letter-spacing="-3" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:96px;font-weight:700;text-anchor:start;dominant-baseline:auto">no es un banco</text>
  <text x="80" y="490" font-family="'Geist', 'Inter', sans-serif" font-size="96" font-weight="700" fill="#3A3A3A" letter-spacing="-3" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:96px;font-weight:700;text-anchor:start;dominant-baseline:auto">de papers.</text>
  <text x="80" y="600" font-family="'Geist', 'Inter', sans-serif" font-size="96" font-weight="700" fill="#3A3A3A" letter-spacing="-3" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:96px;font-weight:700;text-anchor:start;dominant-baseline:auto">no es contenido</text>
  <text x="80" y="700" font-family="'Geist', 'Inter', sans-serif" font-size="96" font-weight="700" fill="#3A3A3A" letter-spacing="-3" style="fill:rgb(58, 58, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:96px;font-weight:700;text-anchor:start;dominant-baseline:auto">suelto.</text>

  <!-- Separador terracota -->
  <rect x="80" y="750" width="920" height="1.5" fill="#C25A2C" opacity="0.4" style="fill:rgb(194, 90, 44);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Remate en blanco -->
  <text x="80" y="840" font-family="'Geist', 'Inter', sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" letter-spacing="-1" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">Es una herramienta para pensar</text>
  <text x="80" y="910" font-family="'Geist', 'Inter', sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" letter-spacing="-1" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">mejor en <tspan fill="#C25A2C" style="fill:rgb(194, 90, 44);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Geist, Inter, sans-serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">nuestra consulta.</tspan></text>
</svg>